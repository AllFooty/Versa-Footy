name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Debug secret shape
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "ACCOUNT_ID length: ${#CLOUDFLARE_ACCOUNT_ID}"
          echo "ACCOUNT_ID sha256: $(printf %s "$CLOUDFLARE_ACCOUNT_ID" | sha256sum)"
          echo "API_TOKEN length: ${#CLOUDFLARE_API_TOKEN}"
          echo "API_TOKEN sha256: $(printf %s "$CLOUDFLARE_API_TOKEN" | sha256sum)"
          echo "=== direct CF API call ==="
          curl -sw "\nHTTP %{http_code}\n" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/versa-footy" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | head -c 600

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist/public --project-name=versa-footy --branch=main
